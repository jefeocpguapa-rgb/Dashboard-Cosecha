<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Bines — Agrícola Guapa</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #f4f6f8; color: #222; }
header { background: #2C3E50; color: white; padding: 16px 20px; }
header h1 { font-size: 17px; font-weight: 600; }
header span { font-size: 12px; color: #7EC8E3; }
.tabs { display: flex; background: #fff; border-bottom: 1px solid #ddd; }
.tab { flex: 1; padding: 12px 6px; text-align: center; font-size: 13px; font-weight: 500; cursor: pointer; border-bottom: 3px solid transparent; color: #666; }
.tab.active { border-bottom-color: #163F61; color: #163F61; }
.container { padding: 16px; max-width: 600px; margin: 0 auto; }
.card { background: #fff; border-radius: 10px; border: 1px solid #ddd; padding: 16px; margin-bottom: 14px; }
label { font-size: 13px; color: #555; display: block; margin-bottom: 5px; }
input, select { width: 100%; padding: 10px 12px; border: 1px solid #ccc; border-radius: 7px; font-size: 15px; margin-bottom: 12px; }
.auto-val { background: #f4f6f8; border: 1px solid #ccc; border-radius: 7px; padding: 10px 12px; font-size: 15px; color: #555; margin-bottom: 12px; text-align: center; font-weight: 600; }
.bin-input { font-size: 32px; font-weight: 700; text-align: center; padding: 14px; letter-spacing: 2px; }
.btn { width: 100%; padding: 14px; font-size: 16px; font-weight: 600; border: none; border-radius: 8px; cursor: pointer; margin-bottom: 8px; }
.btn-primary { background: #163F61; color: white; }
.btn-danger { background: #c0392b; color: white; }
.btn:disabled { background: #aaa; cursor: not-allowed; }
.badge { padding: 8px 14px; border-radius: 7px; font-size: 13px; font-weight: 600; margin-bottom: 12px; text-align: center; }
.badge.ok { background: #d4edda; color: #155724; }
.badge.warn { background: #fff3cd; color: #856404; }
.badge.info { background: #d1ecf1; color: #0c5460; }
.badge.error { background: #f8d7da; color: #721c24; }
.auto-row { display: flex; gap: 10px; }
.auto-row > div { flex: 1; }
.metrics { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
.metric { flex: 1; min-width: 80px; background: #f4f6f8; border-radius: 8px; padding: 12px; text-align: center; }
.metric .val { font-size: 22px; font-weight: 700; }
.metric .lbl { font-size: 11px; color: #777; margin-top: 3px; }
.green { color: #27ae60; }
.orange { color: #e67e22; }
.red { color: #c0392b; }
.progress-wrap { background: #e0e0e0; border-radius: 99px; height: 13px; overflow: hidden; margin-bottom: 6px; }
.progress-bar { height: 100%; border-radius: 99px; transition: width 0.4s; }
.chart { display: flex; gap: 3px; align-items: flex-end; height: 150px; margin-top: 8px; }
.bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; }
.bar-val { font-size: 9px; font-weight: 700; min-height: 12px; }
.bar-wrap { position: relative; width: 100%; height: 128px; display: flex; align-items: flex-end; justify-content: center; }
.bar-meta { position: absolute; left: 0; right: 0; border-top: 1.5px dashed #aaa; }
.bar { width: 72%; border-radius: 3px 3px 0 0; }
.bar-lbl { font-size: 9px; color: #999; }
.legend { display: flex; gap: 14px; margin-top: 10px; font-size: 11px; color: #777; flex-wrap: wrap; }
.legend span { display: flex; align-items: center; gap: 5px; }
.dot { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }
table { width: 100%; border-collapse: collapse; font-size: 11px; }
th { text-align: left; padding: 6px 5px; border-bottom: 1px solid #ddd; color: #777; font-weight: 600; font-size: 10px; }
td { padding: 6px 5px; }
tr:nth-child(even) td { background: #f9f9f9; }
.empty { text-align: center; padding: 30px; color: #aaa; font-size: 14px; }
.ultimo { background: #eaf6ee; border: 1px solid #b2dfcc; border-radius: 8px; padding: 10px 14px; margin-bottom: 12px; font-size: 13px; color: #155724; display: none; }
.minutos-calc { background: #fff3cd; border: 1px solid #ffc107; border-radius: 7px; padding: 10px 14px; margin-bottom: 12px; font-size: 14px; font-weight: 600; color: #856404; text-align: center; display: none; }
</style>
</head>
<body>

<header>
  <h1>Control de Bines</h1>
  <span>Agrícola Guapa S.A.S — Planta Empacadora</span>
</header>

<div class="tabs">
  <div class="tab active" onclick="setTab('ingreso')" id="tab-ingreso">📥 Registrar Bin</div>
  <div class="tab" onclick="setTab('parada')" id="tab-parada">⏸ Parada</div>
  <div class="tab" onclick="setTab('dashboard')" id="tab-dashboard">📊 Dashboard</div>
</div>

<div class="container">
  <div id="msg" class="badge info">Cargando datos...</div>

  <!-- INGRESO BIN -->
  <div id="vista-ingreso">
    <div class="card">
      <div class="auto-row">
        <div>
          <label>Fecha</label>
          <div class="auto-val" id="disp-fecha">—</div>
        </div>
        <div>
          <label>Hora</label>
          <input type="time" id="disp-hora" style="font-weight:600;text-align:center;">
        </div>
      </div>
      <label>Número de bin</label>
      <input type="number" id="inp-bin" class="bin-input" min="1" placeholder="Ej: 45" inputmode="numeric">
      <label>Grupo de Forza</label>
      <select id="inp-gf">
        <option value="">— Selecciona —</option>
      </select>
      <label>Lote</label>
      <input type="text" id="inp-lote" placeholder="Ej: L-2401" style="text-transform:uppercase">
      <label>Finca</label>
      <select id="inp-finca">
        <option value="">— Selecciona —</option>
        <option>LAS AMERICAS</option>
        <option>LA FE</option>
        <option>JAMAICA</option>
        <option>BRASIL</option>
        <option>EGIPTO</option>
        <option>ARGENTINA</option>
      </select>
      <label>Observaciones Proceso</label>
      <select id="inp-obs">
        <option value="">— Selecciona (opcional) —</option>
        <option>PESCA</option>
        <option>FALTA DE ENERGIA</option>
        <option>FALTA DE FRUTA</option>
        <option>FALTA DE ESTIBAS</option>
        <option>FALTA DE CANASTAS</option>
        <option>FALTA DE MONTACARGAS</option>
        <option>GASES DE MONTACARGAS</option>
        <option>MONTACARGAS VARADO</option>
        <option>REUNION</option>
        <option>CAMBIO DE FRUTA DE LA SEMANA</option>
        <option>CAMBIO DE BINES CON FRUTA</option>
        <option>CAMBIO DE MERCADO</option>
        <option>CAPACITACION</option>
        <option>PARE DE BANDA</option>
        <option>BANDA VARADA</option>
        <option>BASCULA VARADA</option>
        <option>REFRIGERIO</option>
        <option>RECESO PARA COMER</option>
        <option>REDUCCION DE BANDA</option>
        <option>PREPARACION PARA PEDIDOS</option>
        <option>PROCESO MANUAL</option>
        <option>BINES DE FLORACION</option>
        <option>INICIO DE PROCESO</option>
        <option>FIN DE PROCESO</option>
      </select>
      <div class="ultimo" id="ultimo-bin"></div>
      <button class="btn btn-primary" onclick="guardarBin()" id="btn-bin">Registrar Bin</button>
    </div>
  </div>

  <!-- PARADA -->
  <div id="vista-parada" style="display:none">
    <div class="card">
      <p style="font-size:13px;color:#777;margin-bottom:16px;">Registra una parada del proceso indicando la causa y el tiempo.</p>
      <div class="auto-row">
        <div>
          <label>Fecha</label>
          <div class="auto-val" id="disp-fecha-p">—</div>
        </div>
        <div></div>
      </div>
      <label>Causa de la parada</label>
      <select id="par-obs">
        <option value="">— Selecciona —</option>
        <option>PESCA</option>
        <option>FALTA DE ENERGIA</option>
        <option>FALTA DE FRUTA</option>
        <option>FALTA DE ESTIBAS</option>
        <option>FALTA DE CANASTAS</option>
        <option>FALTA DE MONTACARGAS</option>
        <option>GASES DE MONTACARGAS</option>
        <option>MONTACARGAS VARADO</option>
        <option>REUNION</option>
        <option>CAMBIO DE FRUTA DE LA SEMANA</option>
        <option>CAMBIO DE BINES CON FRUTA</option>
        <option>CAMBIO DE MERCADO</option>
        <option>CAPACITACION</option>
        <option>PARE DE BANDA</option>
        <option>BANDA VARADA</option>
        <option>BASCULA VARADA</option>
        <option>REFRIGERIO</option>
        <option>RECESO PARA COMER</option>
        <option>REDUCCION DE BANDA</option>
        <option>PREPARACION PARA PEDIDOS</option>
        <option>PROCESO MANUAL</option>
        <option>BINES DE FLORACION</option>
        <option>INICIO DE PROCESO</option>
        <option>FIN DE PROCESO</option>
      </select>
      <div class="auto-row">
        <div>
          <label>Hora inicio</label>
          <input type="time" id="par-inicio" onchange="calcularMinutos()">
        </div>
        <div>
          <label>Hora fin</label>
          <input type="time" id="par-fin" onchange="calcularMinutos()">
        </div>
      </div>
      <div class="minutos-calc" id="min-calc"></div>
      <div class="ultimo" id="ultimo-parada"></div>
      <button class="btn btn-danger" onclick="guardarParada()" id="btn-parada">Registrar Parada</button>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="vista-dashboard" style="display:none">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
      <label style="margin:0;white-space:nowrap">Fecha:</label>
      <input type="date" id="dash-fecha" style="width:auto;margin:0;flex:1">
      <button onclick="cargarTodo()" style="padding:8px 14px;border:1px solid #ccc;border-radius:7px;background:#fff;cursor:pointer;font-size:16px;">↺</button>
    </div>

    <div class="metrics">
      <div class="metric"><div class="val" id="d-total">—</div><div class="lbl">Bines hoy</div></div>
      <div class="metric"><div class="val" id="d-prom">—</div><div class="lbl">Prom/hora</div></div>
      <div class="metric"><div class="val" id="d-proy">—</div><div class="lbl">Proyección</div></div>
      <div class="metric"><div class="val red" id="d-min-perdidos">—</div><div class="lbl">Min. paradas</div></div>
    </div>

    <div class="card">
      <label style="font-weight:600;margin-bottom:10px;">Avance del turno (meta 120)</label>
      <div class="progress-wrap"><div class="progress-bar" id="prog-bar" style="width:0%"></div></div>
      <div style="font-size:12px;color:#999;" id="prog-txt">0% — 0 / 120 bines</div>
    </div>

    <div class="card">
      <label style="font-weight:600;margin-bottom:4px;">Bines por hora</label>
      <div class="chart" id="chart"></div>
      <div class="legend">
        <span><span class="dot" style="background:#27ae60"></span>En meta</span>
        <span><span class="dot" style="background:#e67e22"></span>Bajo meta</span>
        <span><span style="border-top:1.5px dashed #aaa;width:14px;display:inline-block"></span>Meta (12)</span>
      </div>
    </div>

    <div class="card">
      <label style="font-weight:600;margin-bottom:10px;">Paradas del día</label>
      <div id="tabla-paradas"></div>
    </div>

    <div class="card">
      <label style="font-weight:600;margin-bottom:10px;">Registros de bines</label>
      <div id="tabla-body"></div>
    </div>
  </div>
</div>

<script>
const SCRIPT = "https://script.google.com/macros/s/AKfycbyGcGCkIrMm2ye3BQ34lF3iEVmeUYw2s7_yd3rN7Kk26NjtVV6t6GlUDE1TjuhcWOKDZA/exec";
const META = 12, HORAS = 10, META_T = 120;
let registros = [], paradas = [];

function getHoy() {
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
}
function getHoraActual() {
  const d = new Date();
  return String(d.getHours()).padStart(2,"0") + ":" + String(d.getMinutes()).padStart(2,"0");
}
function setMsg(tipo, txt) {
  const el = document.getElementById("msg");
  el.className = "badge " + tipo;
  el.textContent = txt;
}
function setTab(t) {
  ["ingreso","parada","dashboard"].forEach(v => {
    document.getElementById("vista-"+v).style.display = v === t ? "" : "none";
    document.getElementById("tab-"+v).className = "tab" + (v === t ? " active" : "");
  });
  if (t === "dashboard") renderDashboard();
}
function calcularMinutos() {
  const ini = document.getElementById("par-inicio").value;
  const fin = document.getElementById("par-fin").value;
  const el = document.getElementById("min-calc");
  if (!ini || !fin) { el.style.display = "none"; return; }
  const mins = Math.round((new Date("2000-01-01T"+fin) - new Date("2000-01-01T"+ini)) / 60000);
  if (mins <= 0) { el.style.display = "none"; return; }
  el.style.display = "";
  el.textContent = "⏱ Duración: " + mins + " minutos";
}
function initForm() {
  document.getElementById("dash-fecha").value = getHoy();
  document.getElementById("disp-fecha").textContent = getHoy();
  document.getElementById("disp-fecha-p").textContent = getHoy();
  document.getElementById("disp-hora").value = getHoraActual();
  setInterval(function() {
    const hoy = getHoy();
    document.getElementById("disp-fecha").textContent = hoy;
    document.getElementById("disp-fecha-p").textContent = hoy;
    if (!document.getElementById("disp-hora").dataset.tocado) {
      document.getElementById("disp-hora").value = getHoraActual();
    }
  }, 30000);
  document.getElementById("disp-hora").addEventListener("change", function() { this.dataset.tocado = "1"; });
  const sel = document.getElementById("inp-gf");
  for (let i = 1; i <= 52; i++) {
    const o = document.createElement("option");
    const num = String(i).padStart(2,"0");
    o.value = "GF"+num+"26"; o.textContent = "GF"+num+"26";
    sel.appendChild(o);
  }
}

function jsonp(url, cb) {
  const name = "cb_" + Date.now();
  const s = document.createElement("script");
  window[name] = function(data) { cb(data); document.body.removeChild(s); delete window[name]; };
  s.onerror = function() { cb(null); document.body.removeChild(s); };
  s.src = url + (url.includes("?") ? "&" : "?") + "callback=" + name + "&t=" + Date.now();
  document.body.appendChild(s);
}

function cargarTodo() {
  setMsg("info", "Cargando datos...");
  jsonp(SCRIPT, function(data) {
    if (!data) { setMsg("error", "Error cargando bines."); return; }
    registros = (data.registros||[]).map(r => ({
      fecha: typeof r.fecha==="string" ? r.fecha.split("T")[0] : new Date(r.fecha).toISOString().split("T")[0],
      hora: parseInt(r.hora), bin: r.bin, gf: r.gf, lote: r.lote, finca: r.finca, obs: r.obs
    }));
    jsonp(SCRIPT + "?tipo=paradas", function(data2) {
      if (data2) {
        paradas = (data2.paradas||[]).map(p => ({
          fecha: typeof p.fecha==="string" ? p.fecha.split("T")[0] : new Date(p.fecha).toISOString().split("T")[0],
          inicio: p.inicio, fin: p.fin, minutos: parseInt(p.minutos)||0, obs: p.obs
        }));
      }
      setMsg("ok", registros.length + " bines, " + paradas.length + " paradas ✓");
      renderDashboard();
    });
  });
}

function guardarBin() {
  const bin = document.getElementById("inp-bin").value.trim();
  const gf = document.getElementById("inp-gf").value;
  const lote = document.getElementById("inp-lote").value.trim().toUpperCase();
  const finca = document.getElementById("inp-finca").value;
  const obs = document.getElementById("inp-obs").value;
  if (!bin||!gf||!lote||!finca) { setMsg("warn","Completa Bin, Grupo de Forza, Lote y Finca."); return; }
  const fecha = getHoy();
  const horaStr = document.getElementById("disp-hora").value || getHoraActual();
  const hora = parseInt(horaStr.split(":")[0]);
  const btn = document.getElementById("btn-bin");
  btn.disabled = true; btn.textContent = "Registrando...";
  setMsg("info","Guardando...");
  jsonp(SCRIPT + "?fecha="+encodeURIComponent(fecha)+"&hora="+hora+"&bin="+encodeURIComponent(bin)+"&gf="+encodeURIComponent(gf)+"&lote="+encodeURIComponent(lote)+"&finca="+encodeURIComponent(finca)+"&obs="+encodeURIComponent(obs), function(data) {
    if (data && data.ok) {
      const ult = document.getElementById("ultimo-bin");
      ult.style.display = "";
      ult.textContent = "✓ Bin #"+bin+" — "+finca+" / "+gf+" / Lote "+lote+" a las "+horaStr;
      document.getElementById("inp-bin").value = "";
      document.getElementById("disp-hora").removeAttribute("data-tocado");
      document.getElementById("disp-hora").value = getHoraActual();
      setMsg("ok","¡Bin registrado ✓");
      setTimeout(cargarTodo, 1500);
    } else { setMsg("error","Error al guardar."); }
    btn.disabled = false; btn.textContent = "Registrar Bin";
  });
}

function guardarParada() {
  const obs = document.getElementById("par-obs").value;
  const ini = document.getElementById("par-inicio").value;
  const fin = document.getElementById("par-fin").value;
  if (!obs||!ini||!fin) { setMsg("warn","Completa causa, hora inicio y hora fin."); return; }
  const mins = Math.round((new Date("2000-01-01T"+fin) - new Date("2000-01-01T"+ini)) / 60000);
  if (mins <= 0) { setMsg("warn","La hora fin debe ser mayor que la hora inicio."); return; }
  const fecha = getHoy();
  const btn = document.getElementById("btn-parada");
  btn.disabled = true; btn.textContent = "Registrando...";
  setMsg("info","Guardando parada...");
  jsonp(SCRIPT + "?tipo=parada_nueva&fecha="+encodeURIComponent(fecha)+"&inicio="+encodeURIComponent(ini)+"&fin="+encodeURIComponent(fin)+"&minutos="+mins+"&obs="+encodeURIComponent(obs), function(data) {
    if (data && data.ok) {
      const ult = document.getElementById("ultimo-parada");
      ult.style.display = "";
      ult.textContent = "✓ Parada registrada: "+obs+" — "+mins+" minutos ("+ini+" a "+fin+")";
      document.getElementById("par-obs").value = "";
      document.getElementById("par-inicio").value = "";
      document.getElementById("par-fin").value = "";
      document.getElementById("min-calc").style.display = "none";
      setMsg("ok","¡Parada registrada ✓");
      setTimeout(cargarTodo, 1500);
    } else { setMsg("error","Error al guardar parada."); }
    btn.disabled = false; btn.textContent = "Registrar Parada";
  });
}

function renderDashboard() {
  const fecha = document.getElementById("dash-fecha").value;
  const regs = registros.filter(r => r.fecha === fecha).sort((a,b) => a.hora - b.hora);
  const pars = paradas.filter(p => p.fecha === fecha);
  const total = regs.length;
  const horaActual = new Date().getHours();
  const horasT = Math.max(1, Math.min(HORAS, horaActual - 6));
  const prom = (total / horasT).toFixed(1);
  const proy = Math.round(total + (total/horasT) * Math.max(0, HORAS - horasT));
  const pct = Math.min(100, Math.round(total/META_T*100));
  const minPerdidos = pars.reduce((s,p) => s + p.minutos, 0);

  document.getElementById("d-total").textContent = total;
  document.getElementById("d-prom").textContent = prom;
  document.getElementById("d-prom").className = "val " + (parseFloat(prom)>=META?"green":"orange");
  document.getElementById("d-proy").textContent = proy||"—";
  document.getElementById("d-proy").className = "val " + (proy>=META_T?"green":"orange");
  document.getElementById("d-min-perdidos").textContent = minPerdidos + " min";

  const bar = document.getElementById("prog-bar");
  bar.style.width = pct + "%";
  bar.style.background = pct>=100?"#27ae60":pct>=60?"#2ECC71":"#e67e22";
  document.getElementById("prog-txt").textContent = pct+"% — "+total+" / "+META_T+" bines";

  const maxB = Math.max(META, ...Array.from({length:HORAS},(_,i)=>regs.filter(r=>r.hora===i+6).length), 1);
  const chart = document.getElementById("chart");
  chart.innerHTML = "";
  for (let h = 6; h <= 15; h++) {
    const cnt = regs.filter(r=>r.hora===h).length;
    const barH = cnt>0?Math.max(4,Math.round(cnt/maxB*120)):4;
    const metaH = Math.round(META/maxB*120);
    const col = document.createElement("div");
    col.className = "bar-col";
    col.innerHTML =
      '<div class="bar-val" style="color:'+(cnt>0?(cnt>=META?"#27ae60":"#e67e22"):"transparent")+'">'+(cnt>0?cnt:"·")+'</div>'+
      '<div class="bar-wrap"><div class="bar-meta" style="bottom:'+metaH+'px"></div>'+
      '<div class="bar" style="height:'+barH+'px;background:'+(cnt===0?"#e0e0e0":cnt>=META?"#27ae60":"#e67e22")+'"></div></div>'+
      '<div class="bar-lbl">'+h+'h</div>';
    chart.appendChild(col);
  }

  const tp = document.getElementById("tabla-paradas");
  if (!pars.length) {
    tp.innerHTML = '<div class="empty">Sin paradas registradas</div>';
  } else {
    const totalMin = pars.reduce((s,p)=>s+p.minutos,0);
    tp.innerHTML = '<table><thead><tr><th>Causa</th><th>Inicio</th><th>Fin</th><th>Min.</th></tr></thead><tbody>' +
      pars.map(p=>'<tr><td style="font-size:10px">'+p.obs+'</td><td>'+p.inicio+'</td><td>'+p.fin+'</td><td><strong>'+p.minutos+'</strong></td></tr>').join("") +
      '<tr style="background:#fff3cd"><td colspan="3" style="font-weight:600;padding:6px 5px">Total paradas</td><td style="font-weight:700;color:#c0392b">'+totalMin+' min</td></tr>' +
      '</tbody></table>';
  }

  const tb = document.getElementById("tabla-body");
  if (!regs.length) { tb.innerHTML = '<div class="empty">Sin registros para esta fecha</div>'; return; }
  tb.innerHTML = '<table><thead><tr><th>Hora</th><th>Bin</th><th>Grupo Forza</th><th>Lote</th><th>Finca</th></tr></thead><tbody>' +
    regs.map(r=>'<tr><td>'+String(r.hora).padStart(2,"0")+':00</td><td><strong>'+r.bin+'</strong></td><td>'+(r.gf||"—")+'</td><td>'+(r.lote||"—")+'</td><td>'+(r.finca||"—")+'</td></tr>').join("") +
    '</tbody></table>';
}

initForm();
cargarTodo();
</script>
</body>
</html>
