<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Bines — Agrícola Guapa</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f4f6f8; color: #222; }
  header { background: #2C3E50; color: white; padding: 16px 20px; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 17px; font-weight: 600; }
  header span { font-size: 12px; color: #7EC8E3; }
  .tabs { display: flex; background: #fff; border-bottom: 1px solid #ddd; }
  .tab { flex: 1; padding: 14px; text-align: center; font-size: 14px; font-weight: 500; cursor: pointer; border-bottom: 3px solid transparent; color: #666; }
  .tab.active { border-bottom-color: #163F61; color: #163F61; }
  .container { padding: 16px; max-width: 600px; margin: 0 auto; }
  .card { background: #fff; border-radius: 10px; border: 1px solid #ddd; padding: 16px; margin-bottom: 14px; }
  label { font-size: 13px; color: #555; display: block; margin-bottom: 5px; }
  input, select { width: 100%; padding: 10px 12px; border: 1px solid #ccc; border-radius: 7px; font-size: 15px; margin-bottom: 12px; }
  .bines-input { font-size: 28px; font-weight: 700; text-align: center; padding: 14px; }
  .btn { width: 100%; padding: 14px; font-size: 16px; font-weight: 600; border: none; border-radius: 8px; cursor: pointer; }
  .btn-primary { background: #163F61; color: white; }
  .btn-primary:disabled { background: #aaa; cursor: not-allowed; }
  .badge { padding: 8px 14px; border-radius: 7px; font-size: 13px; font-weight: 600; margin-bottom: 12px; text-align: center; }
  .badge.ok { background: #d4edda; color: #155724; }
  .badge.warn { background: #fff3cd; color: #856404; }
  .badge.info { background: #d1ecf1; color: #0c5460; }
  .badge.error { background: #f8d7da; color: #721c24; }
  .metrics { display: flex; gap: 10px; margin-bottom: 14px; }
  .metric { flex: 1; background: #f4f6f8; border-radius: 8px; padding: 12px; text-align: center; }
  .metric .val { font-size: 26px; font-weight: 700; }
  .metric .lbl { font-size: 11px; color: #777; margin-top: 3px; }
  .metric .sub { font-size: 11px; color: #aaa; }
  .green { color: #2ECC71; }
  .orange { color: #e67e22; }
  .progress-wrap { background: #e0e0e0; border-radius: 99px; height: 13px; overflow: hidden; margin-bottom: 6px; }
  .progress-bar { height: 100%; border-radius: 99px; transition: width 0.4s; }
  .chart { display: flex; gap: 3px; align-items: flex-end; height: 150px; margin-top: 8px; }
  .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .bar-val { font-size: 9px; font-weight: 700; }
  .bar-wrap { position: relative; width: 100%; height: 128px; display: flex; align-items: flex-end; justify-content: center; }
  .bar-meta { position: absolute; left: 0; right: 0; border-top: 1.5px dashed #aaa; }
  .bar { width: 72%; border-radius: 3px 3px 0 0; }
  .bar-lbl { font-size: 9px; color: #999; }
  .legend { display: flex; gap: 14px; margin-top: 10px; font-size: 11px; color: #777; align-items: center; }
  .legend span { display: flex; align-items: center; gap: 5px; }
  .dot { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 7px 8px; border-bottom: 1px solid #ddd; color: #777; font-weight: 600; font-size: 12px; }
  td { padding: 8px; }
  tr:nth-child(even) td { background: #f9f9f9; }
  .empty { text-align: center; padding: 30px; color: #aaa; font-size: 14px; }
</style>
</head>
<body>

<header>
  <div>
    <h1>Control de Bines</h1>
    <span>Agrícola Guapa S.A.S — Planta Empacadora</span>
  </div>
</header>

<div class="tabs">
  <div class="tab active" onclick="setTab('ingreso')" id="tab-ingreso">📥 Registrar</div>
  <div class="tab" onclick="setTab('dashboard')" id="tab-dashboard">📊 Dashboard</div>
</div>

<div class="container">
  <div id="msg" class="badge info">Cargando datos...</div>

  <!-- INGRESO -->
  <div id="vista-ingreso">
    <div class="card">
      <label>Fecha</label>
      <input type="date" id="inp-fecha">
      <label>Hora</label>
      <select id="inp-hora"></select>
      <label>Bines procesados <small style="color:#aaa">(meta: 12/hora)</small></label>
      <input type="number" id="inp-bines" class="bines-input" min="0" max="50" placeholder="0">
      <div id="badge-meta" style="display:none" class="badge"></div>
      <button class="btn btn-primary" onclick="guardar()" id="btn-guardar">Guardar en Google Sheet</button>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="vista-dashboard" style="display:none">
    <div style="display:flex; align-items:center; gap:10px; margin-bottom:14px;">
      <label style="margin:0">Fecha:</label>
      <input type="date" id="dash-fecha" style="width:auto; margin:0; flex:1">
      <button onclick="cargar()" style="padding:8px 14px; border:1px solid #ccc; border-radius:7px; background:#fff; cursor:pointer; font-size:13px;">↺</button>
    </div>

    <div class="metrics">
      <div class="metric">
        <div class="val" id="d-total">—</div>
        <div class="lbl">Acumulado</div>
        <div class="sub">meta 120</div>
      </div>
      <div class="metric">
        <div class="val" id="d-prom">—</div>
        <div class="lbl">Promedio/hora</div>
        <div class="sub">meta 12</div>
      </div>
      <div class="metric">
        <div class="val" id="d-proy">—</div>
        <div class="lbl">Proyección</div>
        <div class="sub" id="d-proy-pct">—</div>
      </div>
    </div>

    <div class="card">
      <label style="font-weight:600; margin-bottom:10px;">Avance del turno</label>
      <div class="progress-wrap"><div class="progress-bar" id="prog-bar" style="width:0%"></div></div>
      <div style="font-size:12px; color:#999;" id="prog-txt">0% — 0 / 120 bines</div>
    </div>

    <div class="card">
      <label style="font-weight:600; margin-bottom:4px;">Bines por hora</label>
      <div class="chart" id="chart"></div>
      <div class="legend">
        <span><span class="dot" style="background:#2ECC71"></span>En meta</span>
        <span><span class="dot" style="background:#e67e22"></span>Bajo meta</span>
        <span><span style="border-top:1.5px dashed #aaa; width:14px; display:inline-block"></span>Meta (12)</span>
      </div>
    </div>

    <div class="card" id="tabla-card">
      <label style="font-weight:600; margin-bottom:10px;">Registros del día</label>
      <div id="tabla-body"></div>
    </div>
  </div>
</div>

<script>
const SCRIPT = "https://script.google.com/macros/s/AKfycbxR6S8tg2odLG6Nw3pJY_cE0CThTKThaesg8dkr_sZqxVpt95Wih8tClcPcQQpcW71M7g/exec";
const META = 12, HORAS = 10, META_T = 120;
let registros = [];

function getHoy() {
  return new Date().toISOString().split("T")[0];
}

function setMsg(tipo, txt) {
  const el = document.getElementById("msg");
  el.className = "badge " + tipo;
  el.textContent = txt;
}

function setTab(t) {
  document.getElementById("vista-ingreso").style.display = t === "ingreso" ? "" : "none";
  document.getElementById("vista-dashboard").style.display = t === "dashboard" ? "" : "none";
  document.getElementById("tab-ingreso").className = "tab" + (t === "ingreso" ? " active" : "");
  document.getElementById("tab-dashboard").className = "tab" + (t === "dashboard" ? " active" : "");
  if (t === "dashboard") renderDashboard();
}

function initForm() {
  document.getElementById("inp-fecha").value = getHoy();
  document.getElementById("dash-fecha").value = getHoy();
  const h = new Date().getHours();
  const hora = h < 6 ? 6 : h > 15 ? 15 : h;
  const sel = document.getElementById("inp-hora");
  for (let i = 6; i <= 15; i++) {
    const o = document.createElement("option");
    o.value = i;
    o.textContent = `${String(i).padStart(2,"0")}:00 — ${String(i+1).padStart(2,"0")}:00`;
    if (i === hora) o.selected = true;
    sel.appendChild(o);
  }
  document.getElementById("inp-bines").addEventListener("input", checkMeta);
}

function checkMeta() {
  const v = parseInt(document.getElementById("inp-bines").value);
  const b = document.getElementById("badge-meta");
  if (isNaN(v)) { b.style.display = "none"; return; }
  b.style.display = "";
  if (v >= META) { b.className = "badge ok"; b.textContent = `✓ En meta (+${v - META} vs meta)`; }
  else { b.className = "badge warn"; b.textContent = `⚠ Bajo meta (${v - META} vs meta)`; }
}

async function cargar() {
  setMsg("info", "Leyendo Google Sheet...");
  try {
    const res = await fetch(SCRIPT + "?t=" + Date.now());
    const data = await res.json();
    registros = (data.registros || []).map(r => ({
      fecha: typeof r.fecha === "string" ? r.fecha : new Date(r.fecha).toISOString().split("T")[0],
      hora: parseInt(r.hora),
      bines: parseInt(r.bines)
    }));
    setMsg("ok", `${registros.length} registros cargados ✓`);
    renderDashboard();
  } catch(e) {
    setMsg("error", "Error: " + e.message);
  }
}

async function guardar() {
  const fecha = document.getElementById("inp-fecha").value;
  const hora = parseInt(document.getElementById("inp-hora").value);
  const bines = parseInt(document.getElementById("inp-bines").value);
  if (!fecha || isNaN(bines)) return;
  const btn = document.getElementById("btn-guardar");
  btn.disabled = true; btn.textContent = "Guardando...";
  setMsg("info", "Guardando en Google Sheet...");
  try {
    await fetch(SCRIPT, {
      method: "POST", mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ fecha, hora, bines })
    });
    document.getElementById("inp-bines").value = "";
    document.getElementById("badge-meta").style.display = "none";
    setMsg("ok", "¡Guardado en Google Sheet ✓");
    setTimeout(cargar, 1800);
  } catch(e) {
    setMsg("error", "Error: " + e.message);
  }
  btn.disabled = false; btn.textContent = "Guardar en Google Sheet";
}

function renderDashboard() {
  const fecha = document.getElementById("dash-fecha").value;
  const regs = registros.filter(r => r.fecha === fecha).sort((a,b) => a.hora - b.hora);
  const total = regs.reduce((s,r) => s + r.bines, 0);
  const prom = regs.length ? (total / regs.length) : 0;
  const proy = regs.length ? Math.round(total + prom * Math.max(0, HORAS - regs.length)) : 0;
  const pct = Math.min(100, Math.round(total / META_T * 100));
  const pctProy = Math.min(100, Math.round(proy / META_T * 100));

  document.getElementById("d-total").textContent = total;
  document.getElementById("d-total").className = "val " + (total >= META_T ? "green" : "orange");
  document.getElementById("d-prom").textContent = regs.length ? prom.toFixed(1) : "—";
  document.getElementById("d-prom").className = "val " + (prom >= META ? "green" : "orange");
  document.getElementById("d-proy").textContent = proy || "—";
  document.getElementById("d-proy").className = "val " + (proy >= META_T ? "green" : "orange");
  document.getElementById("d-proy-pct").textContent = proy ? pctProy + "% meta" : "—";

  const bar = document.getElementById("prog-bar");
  bar.style.width = pct + "%";
  bar.style.background = pct >= 100 ? "#27ae60" : pct >= 60 ? "#2ECC71" : "#e67e22";
  document.getElementById("prog-txt").textContent = `${pct}% — ${total} / ${META_T} bines`;

  const maxB = Math.max(META, ...regs.map(r => r.bines), 1);
  const chart = document.getElementById("chart");
  chart.innerHTML = "";
  for (let h = 6; h <= 15; h++) {
    const reg = regs.find(r => r.hora === h);
    const val = reg ? reg.bines : null;
    const barH = val !== null ? Math.max(4, Math.round(val / maxB * 120)) : 4;
    const metaH = Math.round(META / maxB * 120);
    const col = document.createElement("div");
    col.className = "bar-col";
    col.innerHTML = `
      ${val !== null ? `<div class="bar-val" style="color:${val>=META?"#2ECC71":"#e67e22"}">${val}</div>` : '<div class="bar-val"></div>'}
      <div class="bar-wrap">
        <div class="bar-meta" style="bottom:${metaH}px"></div>
        <div class="bar" style="height:${barH}px;background:${val===null?"#e0e0e0":val>=META?"#2ECC71":"#e67e22"}"></div>
      </div>
      <div class="bar-lbl">${h}h</div>`;
    chart.appendChild(col);
  }

  const tb = document.getElementById("tabla-body");
  if (!regs.length) {
    tb.innerHTML = '<div class="empty">Sin registros para esta fecha</div>';
    return;
  }
  tb.innerHTML = `<table><thead><tr><th>Hora</th><th>Bines</th><th>vs Meta</th></tr></thead><tbody>
    ${regs.map((r,i) => {
      const diff = r.bines - META;
      return `<tr><td>${String(r.hora).padStart(2,"0")}:00</td><td><strong>${r.bines}</strong></td>
        <td style="color:${diff>=0?"#2ECC71":"#e67e22"};font-weight:600">${diff>=0?"+"+diff:diff}</td></tr>`;
    }).join("")}
  </tbody></table>`;
}

initForm();
cargar();
</script>
</body>
</html>
